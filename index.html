    ::-webkit-scrollbar-track{background:#030E18;}
    ::-webkit-scrollbar-thumb{background:#0D3A50;border-radius:2px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes glow{0%,100%{opacity:.5}50%{opacity:1}}

    @keyframes barGrow{from{width:0}to{width:var(--bar-w,100%)}}

    .skeleton{background:linear-gradient(90deg,#0A1E2E 25%,#0D2A3A 50%,#0A1E2E 75%);background-size:200% 100%;animation:shimmer 1.6s infinite;}
    button,input{font-family:inherit;-webkit-appearance:none;}
    .cta-btn{transition:all .25s ease;}
    .cta-btn:hover{box-shadow:0 0 20px rgba(80,160,255,0.6);transform:translateY(-2px);}

function getEquipment(n){
  const s=n.toLowerCase();
  if(s.includes('ab wheel')) return ['abwheel'];
  if(s.includes('pull-up')||s.includes('pullup')||s.includes('chin')||s.includes('hanging')||s.includes('windshield')) return ['pullupbar'];
  if(s.includes('cable')) return ['cable'];
  if(s.includes('machine')||s.includes('pec deck')||s.includes('leg press')||s.includes('leg extension')||s.includes('leg curl')||s.includes('hack squat')) return ['machine'];
  if(s.includes('hip thrust')) return ['barbell','bench'];
  if((s.includes('bench press')||s.includes('skull')||s.includes('close-grip')||s.includes('flat bench'))&&!s.includes('dumbbell')&&!s.includes('push-up')) return ['barbell','bench'];
  if((s.includes('incline')||s.includes('preacher')||s.includes('spider'))&&(s.includes('dumbbell')||s.includes('db')||s.includes('curl')||s.includes('fly')||s.includes('kickback'))) return ['dumbbell','bench'];
  if(s.includes('barbell')||s.includes('deadlift')||s.includes('good morning')||s.includes('romanian')||s.includes('t-bar')||s.includes('meadows')||s.includes('push press')||s.includes('landmine')) return ['barbell'];
  if(s.includes('dumbbell')||s.includes('hammer')||s.includes('concentration')||s.includes('zottman')||s.includes('arnold')||s.includes('lateral raise')||s.includes('front raise')||s.includes('rear delt')||s.includes('tate')||s.includes('kickback')||s.includes('cross-body')) return ['dumbbell'];

  return ['dumbbell'];
}

  else if(n.includes('hip thrust')) formNote="hips fully extended, glutes squeezed, knees at 90 degrees";
  else if(n.includes('plank')) formNote="straight body line, elbows under shoulders, core tight";
  return `Highly detailed black and white fitness instructional pencil sketch illustration. A muscular but natural male athlete ${equipment} performing ${exerciseName}${formNote ? ", "+formNote : ""}. ${view}. Style: realistic pencil drawing with fine cross-hatching, stippling for muscle depth and shadow, anatomically correct muscle definition, clean white background, professional fitness textbook quality, no colour, no cartoon, no vector art. Shows correct exercise form and technique clearly.`;

/* ── EXERCISE IMAGE — Pollinations.ai, direct img tag method ── */
function ExerciseImage({name, c}){
  const localSrc=getLocalImage(name);
  const [url,setUrl]=useState(()=>{
    if(localSrc) return localSrc;
    try{ return localStorage.getItem(`ezze_img_${name}`)||null; }catch(e){ return null; }
  });
  const [loaded,setLoaded]=useState(false);
  const [isLocal]=useState(!!localSrc);
  const [errCount,setErrCount]=useState(0);

  useEffect(()=>{
    if(isLocal){ setLoaded(false); return; }
    if(!url) buildUrl();
  },[name]);

  const buildUrl=()=>{
    setLoaded(false);
    const prompt=buildPrompt(name);
    const encoded=encodeURIComponent(prompt);
    const seed=Math.floor(Math.random()*999999);
    setUrl(`https://image.pollinations.ai/prompt/${encoded}?width=1024&height=1024&seed=${seed}&nologo=true&enhance=true&model=flux`);
  };

  const handleLoad=()=>{
    setLoaded(true);
    if(!isLocal){ try{localStorage.setItem(`ezze_img_${name}`,url);}catch(e){} }
  };

  const handleError=()=>{
    if(isLocal) return;
    if(errCount<1){ setErrCount(n=>n+1); setLoaded(false); setTimeout(()=>buildUrl(),2500); }
    else { setErrCount(99); }
  };

  const handleRegen=()=>{
    if(isLocal) return;
    try{localStorage.removeItem(`ezze_img_${name}`);}catch(e){}
    setErrCount(0); setLoaded(false); buildUrl();
  };

  return(
    <div style={{width:"100%",borderRadius:"12px",overflow:"hidden",position:"relative",background:"#030E18"}}>
      {url&&(
        <img src={url} alt={name} onLoad={handleLoad} onError={handleError}
          style={{width:"100%",display:loaded?"block":"none",borderRadius:"12px"}}/>
      )}
      {/* Local badge */}
      {loaded&&isLocal&&(
        <div style={{position:"absolute",top:"8px",left:"8px",padding:"3px 8px",background:"rgba(0,0,0,.7)",borderRadius:"6px",fontSize:"8px",color:"#00C896",letterSpacing:"1px"}}>⚡ LOCAL</div>
      )}
      {/* Skeleton */}
      {(!loaded&&errCount<99)&&(
        <div style={{width:"100%",aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"14px",background:"linear-gradient(90deg,#0A1E2E 25%,#0D2A3A 50%,#0A1E2E 75%)",backgroundSize:"200% 100%",animation:"shimmer 1.6s infinite",borderRadius:"12px"}}>
          <div style={{fontSize:"30px",animation:"spin 1.4s linear infinite",display:"inline-block"}}>{isLocal?"🖼️":"✏️"}</div>
          <div style={{fontSize:"9px",color:c+"88",letterSpacing:"2px",textAlign:"center",lineHeight:"1.8"}}>
            {isLocal?"LOADING IMAGE...":"GENERATING SKETCH..."}<br/>
            {!isLocal&&(errCount===1?"Retrying...":"15–30 seconds")}
          </div>
        </div>
      )}
      {/* Error */}
      {errCount>=99&&(
        <div style={{width:"100%",aspectRatio:"1",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:"12px",background:"#05151E",border:`1.5px dashed #FF000030`,borderRadius:"12px"}}>
          <div style={{fontSize:"11px",color:"#FF4040",textAlign:"center",letterSpacing:".5px"}}>Generation failed</div>
          <button onClick={handleRegen} style={{padding:"10px 24px",background:c+"20",border:`1.5px solid ${c}`,borderRadius:"10px",color:c,fontSize:"11px",letterSpacing:"2px",cursor:"pointer",fontWeight:"700"}}>↺ TRY AGAIN</button>
        </div>
      )}
      {/* Regen for AI images only */}
      {loaded&&!isLocal&&(
        <button onClick={handleRegen} style={{position:"absolute",top:"8px",right:"8px",padding:"4px 12px",background:"rgba(0,0,0,.7)",border:"none",borderRadius:"6px",color:"#ccc",fontSize:"9px",letterSpacing:"1px",cursor:"pointer"}}>↺ REGEN</button>
      )}
    </div>
  );
}

/* ── REST TIMER ── */
function RestTimer({seconds,color,onClose}){
  const [t,setT]=useState(seconds);
  const [on,setOn]=useState(true);
  const iv=useRef();
  const C=2*Math.PI*46;
  useEffect(()=>{
    if(on&&t>0){iv.current=setInterval(()=>setT(x=>x-1),1000);}
    else if(t===0){clearInterval(iv.current);setOn(false);}
    return()=>clearInterval(iv.current);
  },[on,t]);
  const m=Math.floor(t/60),s=t%60;
  return(
    <div style={{position:"fixed",inset:0,background:"rgba(2,11,18,.96)",zIndex:1000,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",backdropFilter:"blur(12px)"}}>
      <div style={{fontSize:"10px",letterSpacing:"5px",color,marginBottom:"20px"}}>REST TIMER</div>
      <svg width="152" height="152" style={{marginBottom:"20px"}}>
        <circle cx="76" cy="76" r="46" fill="none" stroke={color+"22"} strokeWidth="6"/>
        <circle cx="76" cy="76" r="46" fill="none" stroke={color} strokeWidth="6" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C*(1-t/seconds)} transform="rotate(-90 76 76)" style={{transition:"stroke-dashoffset 1s linear"}}/>
        <text x="76" y="72" textAnchor="middle" fill="white" fontSize="28" fontWeight="700" fontFamily="-apple-system,sans-serif">{String(m).padStart(2,"0")}:{String(s).padStart(2,"0")}</text>
        <text x="76" y="90" textAnchor="middle" fill={color+"99"} fontSize="10" fontFamily="-apple-system,sans-serif">{on?"RESTING":"TIME'S UP"}</text>
      </svg>
      {!on&&<div style={{fontSize:"11px",color:"#00FF88",letterSpacing:"3px",marginBottom:"18px",animation:"glow 1s ease-in-out infinite"}}>◉ NEXT SET</div>}
      <div style={{display:"flex",gap:"10px"}}>
        <button onClick={()=>{setT(seconds);setOn(true);}} style={{padding:"11px 22px",background:"transparent",border:`1.5px solid ${color}50`,color,fontSize:"11px",letterSpacing:"2px",cursor:"pointer",borderRadius:"8px"}}>RESET</button>
        <button onClick={onClose} style={{padding:"11px 26px",background:color+"22",border:`1.5px solid ${color}`,color,fontSize:"11px",letterSpacing:"2px",cursor:"pointer",borderRadius:"8px"}}>CLOSE</button>
      </div>
    </div>
  );
}

/* ── WORKOUT VIEW ── */
function WorkoutView({muscle,onBack,onHome,log,setLog,done,setDone}){
  const [routine,setRoutine]=useState(0);
  const [expanded,setExpanded]=useState(null);
  const [timer,setTimer]=useState(null);
  const [showLog,setShowLog]=useState(false);
  const [modal,setModal]=useState(null);
  const M=W[muscle],R=M.routines[routine],c=M.color,a=M.accent;

  const saveSet=(w,r)=>{
    const now=new Date();
    setLog(l=>[...l,{exercise:modal.exercise,setNum:modal.setNum,weight:w,reps:r,time:now.toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"})}]);
    setDone(d=>({...d,[`${muscle}-${routine}-${modal.ei}-${modal.setNum}`]:true}));
    setModal(null);
  };

  return(
    <div style={{maxWidth:"780px",margin:"0 auto",padding:"0 14px 90px",position:"relative",zIndex:1}}>
      {/* Top Nav — 3 buttons: ← BACK | MUSCLE LABEL | LOG */}
      <div style={{display:"flex",alignItems:"center",gap:"8px",padding:"16px 0 18px",borderBottom:`1px solid #0A1E2E`,marginBottom:"18px"}}>
        <button onClick={onBack}
          style={{display:"flex",alignItems:"center",gap:"5px",padding:"8px 14px",background:"transparent",border:"1px solid #0D2030",borderRadius:"20px",color:"#4A8FA8",fontSize:"11px",letterSpacing:"2px",cursor:"pointer",whiteSpace:"nowrap"}}>
          ← BACK
        </button>
        <button onClick={onHome}
          style={{padding:"8px 12px",background:"transparent",border:"1px solid #0D2030",borderRadius:"20px",color:"#1A4060",fontSize:"11px",letterSpacing:"1px",cursor:"pointer",whiteSpace:"nowrap"}}>
          ⌂
        </button>
        <div style={{flex:1,textAlign:"center"}}>
          <div style={{fontSize:"15px",fontWeight:"700",color:c,letterSpacing:"1px"}}>{M.label}</div>
        </div>
        <button onClick={()=>setShowLog(true)} style={{padding:"8px 14px",background:"transparent",border:`1px solid ${c}35`,borderRadius:"20px",color:c+"BB",fontSize:"10px",letterSpacing:"2px",cursor:"pointer",whiteSpace:"nowrap"}}>
          ◎{log.length>0?` ${log.length}`:""}
        </button>
      </div>

      {/* Routine Tabs */}
      <div style={{display:"flex",gap:"8px",marginBottom:"16px"}}>
        {M.routines.map((r,i)=>(
          <button key={i} onClick={()=>{setRoutine(i);setExpanded(null);}}
            style={{flex:1,padding:"12px 8px",border:routine===i?`1.5px solid ${c}`:"1.5px solid #0D2030",borderRadius:"10px",background:routine===i?c+"12":"#030E18",cursor:"pointer",transition:"all .25s",textAlign:"center"}}>
            <div style={{fontSize:"11px",fontWeight:"600",color:routine===i?c:"#2A6080",marginBottom:"3px"}}>{r.name}</div>
            <div style={{fontSize:"9px",letterSpacing:"2px",color:LC[r.level]}}>{r.level}</div>
          </button>
        ))}
      </div>

      {/* Stats Bar */}
      <div style={{display:"flex",gap:"10px",marginBottom:"14px",padding:"12px 16px",background:"#030E18",border:"1px solid #0D2030",borderRadius:"12px"}}>
        {[["DURATION",R.duration],["EXERCISES",R.exercises.length],["LEVEL",R.level]].map(([l,v])=>(
          <div key={l} style={{flex:1,textAlign:"center"}}>
            <div style={{fontSize:"9px",letterSpacing:"3px",color:"#0D3A50",marginBottom:"3px"}}>{l}</div>
            <div style={{fontSize:"14px",fontWeight:"700",color:c}}>{v}</div>
          </div>
        ))}
      </div>

      {/* Exercises */}
      <div style={{display:"flex",flexDirection:"column",gap:"8px"}}>
        {R.exercises.map((ex,i)=>{
          const open=expanded===i;
          const sN=parseInt(ex.sets)||4;
          const logged=[...Array(sN)].filter((_,s)=>done[`${muscle}-${routine}-${i}-${s+1}`]).length;
          return(
            <div key={i} style={{border:open?`1.5px solid ${c}40`:"1.5px solid #0A1E2E",borderRadius:"12px",background:open?c+"07":"#030D16",transition:"all .25s",overflow:"hidden"}}>
              <div onClick={()=>setExpanded(open?null:i)} style={{display:"flex",alignItems:"center",padding:"14px",gap:"12px",cursor:"pointer"}}>
                <div style={{width:"28px",height:"28px",borderRadius:"50%",border:`1.5px solid ${c}44`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px",color:c,flexShrink:0,fontWeight:"700"}}>
                  {i+1}
                </div>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontWeight:"600",fontSize:"14px",color:"#E8E8F0",lineHeight:1.3}}>{ex.name}</div>
                  <div style={{display:"flex",gap:"10px",marginTop:"3px",alignItems:"center"}}>
                    <span style={{fontSize:"10px",color:"#1A4060"}}>⏱ {ex.mins} min</span>
                    {logged>0&&<span style={{fontSize:"10px",color:"#00C896"}}>✓ {logged}/{sN} sets done</span>}
                  </div>
                </div>
                <div style={{textAlign:"right",flexShrink:0,marginRight:"6px"}}>
                  <div style={{fontSize:"12px",color:a,fontWeight:"600"}}>{ex.sets} × {ex.reps}</div>
                  <div style={{fontSize:"10px",color:"#0D3A50",marginTop:"2px"}}>REST {Math.floor(ex.rest/60)>0?Math.floor(ex.rest/60)+"m":""}{ex.rest%60>0?ex.rest%60+"s":""}</div>
                </div>
                <div style={{fontSize:"10px",color:"#0D3A50",transition:"transform .25s",transform:open?"rotate(180deg)":"rotate(0deg)",flexShrink:0}}>▼</div>
              </div>

              {open&&(
                <div style={{borderTop:`1px solid ${c}14`}} className="fu">
                  <div style={{padding:"16px 14px 0"}}>
                    <ExerciseImage name={ex.name} c={c}/>
                    <EquipmentBadges name={ex.name} c={c}/>
                    <div style={{marginTop:"16px",marginBottom:"4px"}}>
                      <div style={{fontSize:"9px",letterSpacing:"3px",color:c,marginBottom:"8px",fontWeight:"600"}}>HOW TO PERFORM</div>
                      <ol style={{paddingLeft:0,listStyle:"none",display:"flex",flexDirection:"column",gap:"6px"}}>
                        {ex.steps.map((st,si)=>(
                          <li key={si} style={{display:"flex",gap:"8px",alignItems:"flex-start"}}>
                            <span style={{fontSize:"10px",color:c+"99",fontWeight:"700",flexShrink:0,marginTop:"2px",minWidth:"16px"}}>{si+1}.</span>
                            <span style={{fontSize:"12px",color:"#4A8FA8",lineHeight:"1.55"}}>{st}</span>
                          </li>
                        ))}
                      </ol>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:"8px",padding:"14px"}}>
                    <button onClick={e=>{e.stopPropagation();setTimer({seconds:ex.rest,color:c});}}
                      style={{flex:1,padding:"11px",background:"transparent",border:`1px solid ${c}35`,borderRadius:"10px",color:c+"BB",fontSize:"10px",letterSpacing:"2px",cursor:"pointer",fontWeight:"600"}}>
                      ⏱ REST
                    </button>
                    <button onClick={e=>{
                      e.stopPropagation();
                      const next=[...Array(sN)].findIndex((_,s)=>!done[`${muscle}-${routine}-${i}-${s+1}`])+1;
                      setModal({exercise:ex.name,setNum:next||sN,ei:i});
                    }} style={{flex:2,padding:"11px",background:c+"18",border:`1.5px solid ${c}`,borderRadius:"10px",color:c,fontSize:"10px",letterSpacing:"2px",cursor:"pointer",fontWeight:"700"}}>
                      ✓ LOG SET
                    </button>
                  </div>
                </div>
              )}
            </div>
          );
        })}
      </div>

      <div style={{textAlign:"center",marginTop:"36px",color:"#0D2A3A",fontSize:"10px",letterSpacing:"3px"}}>TAP EXERCISE · LOG SETS · TRACK PROGRESS</div>
      {timer&&<RestTimer seconds={timer.seconds} color={timer.color} onClose={()=>setTimer(null)}/>}
      {showLog&&<LogPanel log={log} color={c} onClear={()=>setLog([])} onClose={()=>setShowLog(false)}/>}
      {modal&&<SetModal exercise={modal.exercise} setNum={modal.setNum} color={c} onSave={saveSet} onClose={()=>setModal(null)}/>}
    </div>
  );
}

/* ── MAIN APP ── */
function App(){
  const [name,setName]=useState(()=>{
    try{return localStorage.getItem("ezze_name")||"Athlete";}catch(e){return "Athlete";}
  });
  // views: "landing" | "schedule" | muscle key
  const [view,setView]=useState("landing");
  const [log,setLog]=useState([]);
  const [done,setDone]=useState({});
  const [prevView,setPrevView]=useState("schedule");

  const today=new Date().getDay();
  const bgColor=view==="landing"||view==="schedule"
    ?(SPLIT[today]?.color||"#1E90FF")
    :(W[view]?.color||"#1E90FF");

  const saveName=n=>{
    try{localStorage.setItem("ezze_name",n);}catch(e){}
    setName(n);
  };

  const handleSelectDay=d=>{
    const day=SPLIT[d];
    if(!day) return;
    if(day.muscles.length===1){
      setPrevView("schedule");
      setView(day.muscles[0]);
    } else {
      setView("picker_"+d);
    }
  };

  return(
    <div style={{minHeight:"100vh",background:"#020B12",color:"#E8E8F0",position:"relative",overflow:"hidden"}}>
      {/* Grain */}
      <div style={{position:"fixed",inset:0,opacity:.04,backgroundImage:`url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")`,pointerEvents:"none",zIndex:0}}/>
      {/* Glow */}
      <div style={{position:"fixed",top:"-200px",left:"50%",transform:"translateX(-50%)",width:"700px",height:"700px",background:`radial-gradient(circle,${bgColor}1A 0%,transparent 70%)`,pointerEvents:"none",zIndex:0,transition:"background .8s"}}/>

      {view==="landing" && (
        <LandingPage name={name} onEnter={()=>setView("schedule")} onChangeName={saveName}/>
      )}
      {view==="schedule" && (
        <SchedulePage name={name} onSelectDay={handleSelectDay} onHome={()=>setView("landing")}/>
      )}
      {view.startsWith("picker_") && (()=>{
        const d=parseInt(view.replace("picker_",""));
        const day=SPLIT[d];
        return <MusclePicker day={day} onSelect={m=>{setPrevView("picker_"+d);setView(m);}} onBack={()=>setView("schedule")} onHome={()=>setView("landing")}/>;
      })()}
      {view!=="landing" && view!=="schedule" && !view.startsWith("picker_") && (
        <WorkoutView
          muscle={view}
          onBack={()=>setView(prevView)}
          onHome={()=>setView("landing")}
          log={log} setLog={setLog}
          done={done} setDone={setDone}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
